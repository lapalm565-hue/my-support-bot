<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AI Business Suite</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #1e1e3f;
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(79,70,229,0.3);
    }
    .logo {
      text-align: center;
      color: white;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      margin-bottom: 32px;
    }
    .tabs {
      display: flex;
      background: #0f0c29;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      cursor: pointer;
      color: #64748b;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .tab.active {
      background: #4f46e5;
      color: white;
    }
    .form { display: none; }
    .form.active { display: block; }
    .input-group { margin-bottom: 16px; }
    .input-group label {
      color: #a5b4fc;
      font-size: 12px;
      margin-bottom: 6px;
      display: block;
    }
    .input-group input {
      width: 100%;
      background: #0f0c29;
      border: 1px solid rgba(79,70,229,0.4);
      border-radius: 10px;
      padding: 12px 16px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
    }
    .input-group input:focus { border-color: #4f46e5; }
    .btn {
      width: 100%;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .btn:hover { background: #6366f1; }
    .error {
      color: #ef4444;
      font-size: 12px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }
    .success {
      color: #22c55e;
      font-size: 12px;
      margin-top: 12px;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🤖 AI Business Suite</div>
    <div class="subtitle">Manage your business with AI</div>

    <div class="tabs">
      <div class="tab active" onclick="showTab('login')">Login</div>
      <div class="tab" onclick="showTab('signup')">Sign Up</div>
    </div>

    <!-- Login Form -->
    <div class="form active" id="loginForm">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="your@email.com" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter password" />
      </div>
      <button class="btn" onclick="login()">Login</button>
      <div class="error" id="loginError"></div>
    </div>

    <!-- Signup Form -->
    <div class="form" id="signupForm">
      <div class="input-group">
        <label>Business Name</label>
        <input type="text" id="signupBusiness" placeholder="Your Business Name" />
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="signupEmail" placeholder="your@email.com" />
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="signupPassword" placeholder="Create password" />
      </div>
      <button class="btn" onclick="signup()">Create Account</button>
      <div class="error" id="signupError"></div>
      <div class="success" id="signupSuccess"></div>
    </div>
  </div>

  <script>
    function showTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
      document.querySelector(`.tab:${tab === 'login' ? 'first-child' : 'last-child'}`).classList.add('active');
      document.getElementById(tab + 'Form').classList.add('active');
    }

    async function login() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');

      if (!email || !password) {
        errorEl.textContent = 'Please fill all fields!';
        errorEl.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/dashboard';
        } else {
          errorEl.textContent = data.error || 'Login failed!';
          errorEl.style.display = 'block';
        }
      } catch (e) {
        errorEl.textContent = 'Something went wrong!';
        errorEl.style.display = 'block';
      }
    }

    async function signup() {
      const business_name = document.getElementById('signupBusiness').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const errorEl = document.getElementById('signupError');
      const successEl = document.getElementById('signupSuccess');

      if (!business_name || !email || !password) {
        errorEl.textContent = 'Please fill all fields!';
        errorEl.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, business_name })
        });
        const data = await res.json();

        if (data.token) {
          successEl.textContent = 'Account created! Redirecting...';
          successEl.style.display = 'block';
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          setTimeout(() => window.location.href = '/dashboard', 1500);
        } else {
          errorEl.textContent = data.error || 'Signup failed!';
          errorEl.style.display = 'block';
        }
      } catch (e) {
        errorEl.textContent = 'Something went wrong!';
        errorEl.style.display = 'block';
      }
    }

    // If already logged in redirect to dashboard
    if (localStorage.getItem('token')) {
      window.location.href = '/dashboard';
    }
  </script>
</body>
</html>
