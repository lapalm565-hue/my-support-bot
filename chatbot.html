<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Customer Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .header h1 {
      color: white;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .header p {
      color: #64748b;
      font-size: 14px;
    }
    .chat-container {
      width: 100%;
      max-width: 600px;
    }
    .chat-messages {
      background: #1e1e3f;
      border-radius: 14px;
      padding: 20px;
      height: 450px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border: 1px solid rgba(79,70,229,0.2);
      margin-bottom: 16px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 4px; }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.5;
    }
    .bot-message {
      background: #16123a;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      border: 1px solid rgba(79,70,229,0.2);
    }
    .user-message {
      background: #4f46e5;
      color: white;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
    }
    .typing {
      display: flex;
      gap: 5px;
      padding: 12px 16px;
      background: #16123a;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      border: 1px solid rgba(79,70,229,0.2);
    }
    .typing span {
      width: 8px; height: 8px;
      background: #4f46e5;
      border-radius: 50%;
      animation: bounce 1s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }
    .chat-input-row {
      display: flex;
      gap: 10px;
    }
    .chat-input-row input {
      flex: 1;
      background: #1e1e3f;
      border: 1px solid rgba(79,70,229,0.4);
      border-radius: 25px;
      padding: 12px 18px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
    }
    .chat-input-row input::placeholder { color: #64748b; }
    .chat-input-row input:focus { border-color: #4f46e5; }
    .send-btn {
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 50%;
      width: 46px;
      height: 46px;
      cursor: pointer;
      font-size: 18px;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #6366f1; }
    .powered {
      text-align: center;
      color: #64748b;
      font-size: 11px;
      margin-top: 12px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🤖 AI Customer Support</h1>
    <p>Ask me anything about our business!</p>
  </div>

  <div class="chat-container">
    <div class="chat-messages" id="messages">
      <div class="message bot-message">
        👋 Hello! Welcome! How can I help you today?
      </div>
    </div>
    <div class="chat-input-row">
      <input type="text" id="userInput" placeholder="Type your message..." />
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
    <div class="powered">Powered by AI</div>
  </div>

  <script>
    const messages = document.getElementById("messages");
    const input = document.getElementById("userInput");

    input.addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = "message " + type;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement("div");
      div.className = "typing";
      div.id = "typing";
      div.innerHTML = "<span></span><span></span><span></span>";
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      addMessage(text, "user-message");
      showTyping();
      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });
        const data = await res.json();
        document.getElementById("typing")?.remove();
        addMessage(data.reply, "bot-message");
      } catch (e) {
        document.getElementById("typing")?.remove();
        addMessage("Sorry, something went wrong!", "bot-message");
      }
    }
  </script>
</body>
</html>
